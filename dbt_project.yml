name: tlc_warehouse
version: '1.0.0'
config-version: 2

profile: tlc_warehouse    # must match profiles.yml name above

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
log-path: "logs"
target-path: "target"

models:
  tlc_warehouse:
    staging:
      +materialized: view      # staging = lightweight views
      +schema: staging
    marts:
      +materialized: table     # marts = fully materialized tables
      +schema: marts